<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tic Tac Toe</title><link rel="stylesheet" href="css/styles.css"><script src="JS/functions.js" defer="defer"></script><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet"></head><body><div class="container"><h1>Tic Tac Toe</h1><div class="content"><div class="panel"><h3>Configuración</h3><label>Estilo de fichas:</label><select id="styleSelect"><option value="xo">X / O</option><option value="cute">♥ / ★</option><option value="figuras">□ / △</option></select><div class="field"><label>Color línea ganadora:</label><input type="color" id="winColor" value="#ff0000"></div><div class="field"><label>Color celda 1:</label><input type="color" id="cellColor1" value="#ffffff"></div><div class="field"><label>Color celda 2:</label><input type="color" id="cellColor2" value="#e0e0e0"></div><div class="field"><label>Color de bordes</label><input type="color" id="borderColor" value="#333333"></div><div class="field"><label>Color símbolos:</label><input type="color" id="symbolColor" value="#000000"></div><label class="toggle"><input type="checkbox" id="toggleBorders" checked="checked"><span class="slider"></span><span id="labelBorders">Ocultar bordes</span></label></div><div class="game"><p id="timer">03:00</p><table id="board"><tr><td><input type="button" onclick="activo(this)"></td><td><input type="button" onclick="activo(this)"></td><td><input type="button" onclick="activo(this)"></td></tr><tr><td><input type="button" onclick="activo(this)"></td><td><input type="button" onclick="activo(this)"></td><td><input type="button" onclick="activo(this)"></td></tr><tr><td><input type="button" onclick="activo(this)"></td><td><input type="button" onclick="activo(this)"></td><td><input type="button" onclick="activo(this)"></td></tr></table><button class="reset" onclick="reiniciar()">Reiniciar</button></div></div><div id="resultado" class="resultado oculto"></div></div></body></html>
